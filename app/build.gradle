plugins {
    id 'com.android.application'
}

android {
    namespace 'io.soragoto.m500.miku.plus'
    compileSdk = 34

    defaultConfig {
        applicationId "io.soragoto.m500.miku.plus"
        minSdk = 33
        targetSdk = 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file('../../security/testkey.keystore')
            storePassword 'android'
            keyAlias 'testkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
